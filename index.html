<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Detector</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            padding: 24px;
            box-sizing: border-box;
        }
        h1 { margin-bottom: 8px; }
        .subtitle {
            margin: 0 0 20px;
            color: #555;
            text-align: center;
            max-width: 640px;
        }
        .video-container {
            position: relative;
            width: 640px;
            max-width: 100%;
            height: 480px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        #output {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            min-height: 36px;
            text-align: center;
        }
        #supported-gestures {
            margin-top: 12px;
            font-size: 14px;
            color: #666;
            text-align: center;
            max-width: 640px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>Hand Gesture Detector</h1>
    <p class="subtitle">
        Real-time hand gesture recognition using MediaPipe. This detects common hand poses,
        not full sign language. Try a thumbs up, open palm, peace sign, or I love you hand shape.
    </p>
    <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>
    <div id="output">Loading...</div>
    <div id="supported-gestures"></div>

    <script src="app.js" type="module"></script>
</body>
</html>
